name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    needs: quality
    env:
      NODE_ENV: test
      LOG_LEVEL: silent
      # Unit tests mock all service calls — no real ThreatLocker credentials needed
      THREATLOCKER_INSTANCE: h
      THREATLOCKER_API_KEY: test-placeholder-key-ci-000000000000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run test:coverage

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  smoke-test:
    runs-on: ubuntu-latest
    needs: test
    env:
      THREATLOCKER_INSTANCE: h
      THREATLOCKER_API_KEY: test-placeholder-key-ci-000000000000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      # Send an MCP initialize message; server should respond and exit cleanly on timeout
      - run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"0.0.0"}}}' \
          | timeout 5 node dist/stdio.js || true
